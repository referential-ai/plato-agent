name: Windows CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  daemon:
    name: Windows daemon
    runs-on: windows-2025
    env:
      RUST_BACKTRACE: "1"
    steps:
      - name: Check out plato-agent
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true

      - name: Fetch locked Rust dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          cargo fetch --locked
          "CARGO_NET_OFFLINE=true" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Create ACL proof user
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $user = "plato-acl-test"
          $password = "P1pe147!Aa2"
          Write-Output "::add-mask::$password"
          net user $user /delete 2>$null | Out-Null
          net user $user $password /add | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "failed to create second local user" }
          "PLATO_WINDOWS_SECOND_USER=$user" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PLATO_WINDOWS_SECOND_PASSWORD=$password" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Windows tests
        run: cargo test --locked

      - name: Prove installer startup gate
        run: >-
          cargo test --locked --test windows_daemon
          installer_gate_refuses_daemon_before_endpoint_or_lock_creation
          -- --ignored --exact --nocapture

      - name: Prove current-user installer gate isolation
        run: >-
          cargo test --locked --test windows_daemon
          installer_gate_is_isolated_per_current_user
          -- --ignored --exact --nocapture

      - name: Prove pipe and lock ACLs
        run: >-
          cargo test --locked --test windows_daemon
          production_pipe_and_lock_reject_second_user_and_remote_clients
          -- --ignored --exact --nocapture

      - name: Prove hostile pipe pre-bind rejection
        run: >-
          cargo test --locked --test windows_daemon
          client_rejects_second_user_prebound_pipes
          -- --ignored --exact --nocapture

      - name: Prove Ctrl-C graceful shutdown
        run: >-
          cargo test --locked --test windows_daemon
          ctrl_c_stops_daemon_and_removes_lock
          -- --ignored --exact --nocapture

      - name: Prove installer daemon control
        run: >-
          cargo test --locked --test windows_daemon
          installer_control_preflights_refuses_active_and_retries_after_terminal
          -- --ignored --exact --nocapture

      - name: Run Windows clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Remove ACL proof user
        if: always()
        shell: pwsh
        run: |
          net user plato-acl-test /delete 2>$null | Out-Null
          exit 0
