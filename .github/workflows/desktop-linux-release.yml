name: Desktop Linux Release

on:
  push:
    tags:
      - plato-desktop-v*

jobs:
  build:
    name: Build Linux AppImage
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      APPIMAGE_EXTRACT_AND_RUN: "1"
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
    defaults:
      run:
        working-directory: desktop
    steps:
      - name: Check out plato-agent
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Require the release tag to match the desktop version and main
        run: |
          set -euo pipefail
          version=$(jq -r .version src-tauri/tauri.conf.json)
          test "$GITHUB_REF_NAME" = "plato-desktop-v${version}"
          test "$GITHUB_SHA" = "$(git rev-parse origin/main)"

      - name: Fetch locked Rust dependencies
        run: |
          cargo fetch --manifest-path ../Cargo.toml --locked
          cargo fetch --manifest-path src-tauri/Cargo.toml --locked
          echo 'CARGO_NET_OFFLINE=true' >> "$GITHUB_ENV"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Run native tests
        run: |
          cargo test --manifest-path ../Cargo.toml --locked
          cargo test --manifest-path src-tauri/Cargo.toml --locked

      - name: Build Linux AppImage
        run: npm run tauri:bundle:linux -- --ci -- --locked

      - name: Inspect and stage the AppImage
        run: |
          set -euo pipefail
          bundle="$CARGO_TARGET_DIR/x86_64-unknown-linux-gnu/release/bundle/appimage"
          mapfile -t appimages < <(find "$bundle" -maxdepth 1 -type f -name '*.AppImage')
          test "${#appimages[@]}" -eq 1
          appimage="${appimages[0]}"
          chmod +x "$appimage"

          extract="$RUNNER_TEMP/plato-appimage-extract"
          mkdir -p "$extract"
          (cd "$extract" && "$appimage" --appimage-extract >/dev/null)
          bin="$extract/squashfs-root/usr/bin"
          diff -u \
            <(printf '%s\n' plato-agentd plato-desktop) \
            <(find "$bin" -maxdepth 1 -type f -perm /111 -printf '%f\n' | LC_ALL=C sort)
          file -b "$bin/plato-agentd" | grep -Eq '^ELF 64-bit .*x86-64'
          file -b "$bin/plato-desktop" | grep -Eq '^ELF 64-bit .*x86-64'
          "$bin/plato-agentd" --help >/dev/null

          version="${GITHUB_REF_NAME#plato-desktop-v}"
          asset="Plato-${version}-x86_64.AppImage"
          mkdir -p "$GITHUB_WORKSPACE/release"
          cp "$appimage" "$GITHUB_WORKSPACE/release/$asset"

      - name: Upload the AppImage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: linux-appimage
          path: release/*.AppImage
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish private GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download the AppImage artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: linux-appimage
          path: incoming

      - name: Publish and verify the private release
        run: |
          set -euo pipefail
          test "$(gh api "repos/$GITHUB_REPOSITORY" --jq .private)" = true

          mapfile -t files < <(find incoming -maxdepth 1 -type f)
          mapfile -t appimages < <(find incoming -maxdepth 1 -type f -name '*.AppImage')
          test "${#files[@]}" -eq 1
          test "${#appimages[@]}" -eq 1
          appimage="${appimages[0]}"
          asset=$(basename "$appimage")
          checksum="$appimage.sha256"
          (cd incoming && sha256sum "$asset" > "$asset.sha256")

          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            test "$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft)" = true
            gh release delete "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --yes
          fi

          gh release create "$GITHUB_REF_NAME" \
            "$appimage" "$checksum" \
            --repo "$GITHUB_REPOSITORY" \
            --draft \
            --verify-tag \
            --title "Plato Desktop ${GITHUB_REF_NAME#plato-desktop-v}" \
            --notes "Private Linux x86_64 AppImage. Verify it with the attached SHA-256 file."

          verify="$RUNNER_TEMP/release-download"
          mkdir -p "$verify"
          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --dir "$verify" \
            --pattern '*.AppImage' \
            --pattern '*.sha256'
          mapfile -t downloaded < <(find "$verify" -maxdepth 1 -type f)
          mapfile -t downloaded_images < <(find "$verify" -maxdepth 1 -type f -name '*.AppImage')
          mapfile -t downloaded_checksums < <(find "$verify" -maxdepth 1 -type f -name '*.sha256')
          test "${#downloaded[@]}" -eq 2
          test "${#downloaded_images[@]}" -eq 1
          test "${#downloaded_checksums[@]}" -eq 1
          (cd "$verify" && sha256sum -c "$(basename "${downloaded_checksums[0]}")")
          gh release edit "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false
