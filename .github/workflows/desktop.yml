name: Desktop CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  web:
    name: Web
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: desktop
    steps:
      - name: Check out plato-agent
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Prove checkout credentials are absent
        run: |
          if git config --local --get-regexp '^http\..*\.extraheader$' >/dev/null 2>&1; then
            echo "checkout credentials remain" >&2
            exit 1
          else
            status=$?
            test "$status" -eq 1 || exit "$status"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Check types
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build web UI
        run: npm run build

  linux-shell:
    name: Linux shell
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
    defaults:
      run:
        working-directory: desktop
    steps:
      - name: Check out plato-agent
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Fetch locked Rust dependencies
        run: |
          cargo fetch --manifest-path ../Cargo.toml --locked
          cargo fetch --manifest-path src-tauri/Cargo.toml --locked
          echo 'CARGO_NET_OFFLINE=true' >> "$GITHUB_ENV"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Install web dependencies
        run: npm ci

      - name: Run root Rust tests
        run: cargo test --manifest-path ../Cargo.toml --locked

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Run desktop Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked

      - name: Prove Unix sidecar lifecycle
        env:
          PLATO_APPIMAGE_PROOF_KEY: appimage-proof-dummy
        run: |
          cargo build --manifest-path ../Cargo.toml --locked --bin plato-agentd --bin plato
          PLATO_APPIMAGE_TEST_DAEMON="$CARGO_TARGET_DIR/debug/plato-agentd" \
          PLATO_APPIMAGE_TEST_CLI="$CARGO_TARGET_DIR/debug/plato" \
            cargo test --manifest-path src-tauri/Cargo.toml --locked \
              unix_proof::provisioned_unix_sidecar_lifecycle -- \
              --ignored --exact --nocapture --test-threads=1

      - name: Run Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --locked --all-targets -- -D warnings

      - name: Build Linux AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: npm run tauri:bundle:linux -- --ci -- --locked

      - name: Prove AppImage contents and checksum
        run: |
          set -euo pipefail
          bundle="$CARGO_TARGET_DIR/x86_64-unknown-linux-gnu/release/bundle/appimage"
          mapfile -t appimages < <(find "$bundle" -maxdepth 1 -type f -name '*.AppImage')
          test "${#appimages[@]}" -eq 1
          appimage="${appimages[0]}"
          chmod +x "$appimage"

          extract="$RUNNER_TEMP/plato-appimage-extract"
          mkdir -p "$extract"
          (cd "$extract" && "$appimage" --appimage-extract >/dev/null)
          bin="$extract/squashfs-root/usr/bin"
          diff -u \
            <(printf '%s\n' plato-agentd plato-desktop) \
            <(find "$bin" -maxdepth 1 -type f -perm /111 -printf '%f\n' | LC_ALL=C sort)
          file -b "$bin/plato-agentd" | grep -Eq '^ELF 64-bit .*x86-64'
          file -b "$bin/plato-desktop" | grep -Eq '^ELF 64-bit .*x86-64'
          "$bin/plato-agentd" --help >/dev/null

          version=$(node -p "JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json')).version")
          out="$GITHUB_WORKSPACE/artifacts/linux-appimage"
          mkdir -p "$out"
          asset="Plato-${version}-x86_64.AppImage"
          cp "$appimage" "$out/$asset"
          (
            cd "$out"
            sha256sum "$asset" > "$asset.sha256"
            sha256sum -c "$asset.sha256"
            printf '\0' >> "$asset"
            if sha256sum -c "$asset.sha256"; then
              echo "corrupted AppImage passed checksum verification" >&2
              exit 1
            fi
            truncate -s -1 "$asset"
            sha256sum -c "$asset.sha256"
          )

      - name: Upload Linux AppImage proof artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: artifacts/linux-appimage/*
          if-no-files-found: error
          retention-days: 7

  windows-lifecycle:
    name: Windows lifecycle
    runs-on: windows-2025
    env:
      RUST_BACKTRACE: "1"
    steps:
      - name: Check out plato-agent
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Fetch locked Rust dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          cargo fetch --locked
          cargo fetch --manifest-path desktop/src-tauri/Cargo.toml --locked
          "CARGO_NET_OFFLINE=true" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Build sidecars
        run: cargo build --locked --bin plato-agentd --bin plato

      - name: Check Rust formatting
        run: cargo fmt --manifest-path desktop/src-tauri/Cargo.toml --check

      - name: Run Rust tests
        run: cargo test --manifest-path desktop/src-tauri/Cargo.toml --locked

      - name: Prove sidecar lifecycle
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:PLATO_DESKTOP_TEST_DAEMON = (Resolve-Path "target/debug/plato-agentd.exe").Path
          $env:PLATO_DESKTOP_TEST_CLI = (Resolve-Path "target/debug/plato.exe").Path
          cargo test --manifest-path desktop/src-tauri/Cargo.toml --locked windows_proof:: -- --ignored --nocapture --test-threads=1

      - name: Run Rust clippy
        run: cargo clippy --manifest-path desktop/src-tauri/Cargo.toml --locked --all-targets -- -D warnings

  windows-installer:
    name: Windows unsigned installer
    runs-on: windows-2025
    timeout-minutes: 60
    defaults:
      run:
        working-directory: desktop
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}\target
      RUST_BACKTRACE: "1"
    steps:
      - name: Check out plato-agent
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Fetch locked Rust dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          cargo fetch --manifest-path ../Cargo.toml --locked
          cargo fetch --manifest-path src-tauri/Cargo.toml --locked
          "CARGO_NET_OFFLINE=true" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Build unsigned installers
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          npm run tauri:bundle:windows -- --ci -- --locked

          $bundle = Join-Path $env:CARGO_TARGET_DIR "x86_64-pc-windows-msvc\release\bundle\nsis"
          $found = @(Get-ChildItem $bundle -File -Filter "*-setup.exe")
          if ($found.Count -ne 1) {
            throw "expected one base installer, found $($found.Count)"
          }
          $base = Join-Path $env:RUNNER_TEMP "plato-base-setup.exe"
          Copy-Item $found[0].FullName $base
          Remove-Item $bundle -Recurse -Force

          $upgradeConfig = Join-Path $env:RUNNER_TEMP "tauri-upgrade.json"
          [IO.File]::WriteAllText(
            $upgradeConfig,
            '{"version":"0.1.1"}',
            [Text.UTF8Encoding]::new($false)
          )
          npx tauri build --target x86_64-pc-windows-msvc --bundles nsis `
            --config src-tauri/tauri.windows-package.conf.json `
            --config $upgradeConfig --ci --no-sign -- --locked

          $found = @(Get-ChildItem $bundle -File -Filter "*-setup.exe")
          if ($found.Count -ne 1) {
            throw "expected one upgrade installer, found $($found.Count)"
          }
          $upgrade = Join-Path $env:RUNNER_TEMP "plato-upgrade-setup.exe"
          Copy-Item $found[0].FullName $upgrade
          Get-FileHash $base -Algorithm SHA256
          Get-FileHash $upgrade -Algorithm SHA256

      - name: Prove unsigned install, upgrade, and uninstall
        shell: pwsh
        env:
          PLATO_DESKTOP_TEST_BASE_INSTALLER: ${{ runner.temp }}\plato-base-setup.exe
          PLATO_DESKTOP_TEST_UPGRADE_INSTALLER: ${{ runner.temp }}\plato-upgrade-setup.exe
        run: >-
          cargo test --manifest-path src-tauri/Cargo.toml --locked --release
          --target x86_64-pc-windows-msvc
          windows_installer_proof::unsigned_installer_cold_launch_upgrade_and_uninstall_matrix
          -- --ignored --nocapture --test-threads=1
