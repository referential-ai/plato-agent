name: Site

on:
  pull_request:
    paths:
      - site/**
      - .dockerignore
      - docs/images/desktop-plato-agent.png
      - .github/workflows/site.yml
  push:
    branches:
      - main
    paths:
      - site/**
      - .dockerignore
      - docs/images/desktop-plato-agent.png
      - .github/workflows/site.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  IMAGE_NAME: registry.digitalocean.com/kb-sf-repo-1/referential-website

jobs:
  verify:
    name: Verify site
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Check out plato-agent
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Check the static site
        working-directory: site
        run: npm run check

      - name: Check external links
        working-directory: site
        run: npm run check:external

      - name: Require digest-pinned container bases
        run: |
          set -euo pipefail
          from_count=$(grep -Ec '^[[:space:]]*FROM[[:space:]]+' site/Dockerfile)
          pinned_count=$(grep -Ec '^[[:space:]]*FROM[[:space:]]+[^[:space:]@]+@sha256:[0-9a-f]{64}([[:space:]]|$)' site/Dockerfile)
          test "$from_count" -gt 0
          test "$from_count" -eq "$pinned_count"

      - name: Build and smoke-test the container
        run: |
          set -euo pipefail
          docker build --pull --file site/Dockerfile --tag referential-website:verify .
          docker run --detach \
            --name referential-website-verify \
            --publish 127.0.0.1:8080:8080 \
            referential-website:verify
          for _ in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:8080/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs referential-website-verify
          exit 1

      - name: Install Chromium
        working-directory: site
        run: npx playwright install --with-deps chromium

      - name: Run browser proof
        working-directory: site
        env:
          BASE_URL: http://127.0.0.1:8080
        run: npm run test:browser

      - name: Upload browser proof
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: site-browser-${{ github.sha }}
          path: site/artifacts/browser
          if-no-files-found: error
          retention-days: 14

      - name: Stop the verification container
        if: ${{ always() }}
        run: docker rm --force referential-website-verify >/dev/null 2>&1 || true

  publish:
    name: Publish site image
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Check out plato-agent
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up doctl
        uses: digitalocean/action-doctl@3cb3953159719656269e044e0e24ca16dd2a690f # v2.5.2
        with:
          version: "1.163.0"
          no_auth: "true"

      - name: Verify the doctl version
        run: test "$(doctl version)" = "doctl version 1.163.0-release"

      - name: Build the full-SHA tag
        run: |
          set -euo pipefail
          [[ "$GITHUB_SHA" =~ ^[0-9a-f]{40}$ ]]
          tag="$IMAGE_NAME:$GITHUB_SHA"
          docker build --pull --file site/Dockerfile --tag "$tag" .

      - name: Publish and prove authenticated tag and digest readback
        id: publish
        env:
          DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          [[ "$GITHUB_SHA" =~ ^[0-9a-f]{40}$ ]]
          test -n "$DIGITALOCEAN_ACCESS_TOKEN"

          registry=registry.digitalocean.com
          tag="$IMAGE_NAME:$GITHUB_SHA"
          umask 077
          push_config=$(mktemp -d "$RUNNER_TEMP/docker-push.XXXXXX")
          pull_config=$(mktemp -d "$RUNNER_TEMP/docker-pull.XXXXXX")
          cleanup() {
            unset DIGITALOCEAN_ACCESS_TOKEN
            DOCKER_CONFIG="$push_config" docker logout "$registry" >/dev/null 2>&1 || true
            DOCKER_CONFIG="$pull_config" docker logout "$registry" >/dev/null 2>&1 || true
            rm -rf -- "$push_config" "$pull_config"
          }
          trap cleanup EXIT

          doctl --config /dev/null registry docker-config \
            --read-write --expiry-seconds 900 > "$push_config/config.json"
          doctl --config /dev/null registry docker-config \
            --read-write --expiry-seconds 900 > "$pull_config/config.json"
          unset DIGITALOCEAN_ACCESS_TOKEN

          DOCKER_CONFIG="$push_config" docker push "$tag" | tee "$RUNNER_TEMP/site-push.log"
          digest=$(sed -nE 's/.*digest: (sha256:[0-9a-f]{64}).*/\1/p' "$RUNNER_TEMP/site-push.log" | tail -n 1)
          [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          printf 'digest=%s\n' "$digest" >> "$GITHUB_OUTPUT"
          printf "Published \`%s@%s\`.\n" "$IMAGE_NAME" "$digest" >> "$GITHUB_STEP_SUMMARY"

          docker image rm "$tag" >/dev/null
          DOCKER_CONFIG="$pull_config" docker pull "$tag"
          digest_ref="$IMAGE_NAME@$digest"
          docker image inspect "$tag" --format '{{json .RepoDigests}}' \
            | jq --exit-status --arg expected "$digest_ref" "index(\$expected) != null"

          docker image rm "$tag" >/dev/null
          DOCKER_CONFIG="$pull_config" docker pull "$digest_ref"
          docker image inspect "$digest_ref" --format '{{json .RepoDigests}}' \
            | jq --exit-status --arg expected "$digest_ref" "index(\$expected) != null"
          printf "Authenticated readback passed for \`%s\` and \`%s\`.\n" \
            "$tag" "$digest_ref" >> "$GITHUB_STEP_SUMMARY"
